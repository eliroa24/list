name: Build plain text pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and create plain text files
        run: |
          mkdir -p build
          
          ROUTE_JSON='${{ secrets.ROUTE_MAP }}'
          
          if [ -z "$ROUTE_JSON" ]; then
            echo "ROUTE_MAP secret is empty" > build/index.html
            exit 1
          fi
          
          # پردازش هر مسیر
          echo "$ROUTE_JSON" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read slug url; do
            echo "Processing $slug -> $url"
            mkdir -p "build/$slug"
            # دریافت محتوا (متن خام)
            content=$(curl -sL "$url")
            if [ $? -eq 0 ] && [ -n "$content" ]; then
              # مستقیماً محتوا را در فایل index.html بنویسید (بدون هیچ تگی)
              echo "$content" > "build/$slug/index.html"
            else
              echo "Failed to fetch content" > "build/$slug/index.html"
            fi
          done
          
          # صفحه اصلی (اختیاری)
          echo "Use /text1 or /text2" > build/index.html
          
          # صفحه 404 برای مسیرهای ناشناخته (بدون تگ، فقط متن)
          echo "404 - Not found" > build/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
