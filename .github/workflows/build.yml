name: Build plain text from any webpage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install html2text
        run: sudo apt-get update && sudo apt-get install -y html2text

      - name: Fetch and extract plain text
        run: |
          mkdir -p build
          
          ROUTE_JSON='${{ secrets.ROUTE_MAP }}'
          
          if [ -z "$ROUTE_JSON" ]; then
            echo "ROUTE_MAP secret is empty" > build/index.html
            exit 1
          fi
          
          echo "$ROUTE_JSON" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read slug url; do
            echo "Processing $slug -> $url"
            mkdir -p "build/$slug"
            # دریافت صفحه (حتی اگر HTML باشد)
            curl -sL "$url" > temp.html
            # تبدیل HTML به متن ساده (بدون هیچ تگی)
            html2text -utf8 temp.html > plain.txt
            # حذف خطوط خالی اضافی (اختیاری)
            sed -i '/^$/d' plain.txt
            content=$(cat plain.txt)
            # ذخیره مستقیم متن ساده در فایل index.html
            echo "$content" > "build/$slug/index.html"
            rm temp.html plain.txt
          done
          
          echo "Use /text1 or /text2" > build/index.html
          echo "404 - Not found" > build/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
