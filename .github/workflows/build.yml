name: Build plain text from individual secrets

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install html2text
        run: sudo apt-get update && sudo apt-get install -y html2text

      - name: Fetch and extract plain text
        run: |
          mkdir -p build
          
          # لیست اسلاگ‌های مجاز (همینجا قابل مشاهده است)
          SLUGS="text1 text2 text3"
          
          for slug in $SLUGS; do
            # ساخت نام secret متناظر با حروف بزرگ
            secret_name="${slug^^}_URL"   # مثلاً text1 -> TEXT1_URL
            # دسترسی به secret از طریق env (در مرحله بعد تعریف می‌شود)
            url="${!secret_name}"
            if [ -n "$url" ]; then
              echo "Processing $slug -> $url"
              mkdir -p "build/$slug"
              curl -sL "$url" > temp.html
              html2text -utf8 temp.html > plain.txt
              sed -i '/^$/d' plain.txt
              content=$(cat plain.txt)
              echo "$content" > "build/$slug/index.html"
              rm temp.html plain.txt
            else
              echo "No secret found for $slug" > "build/$slug/index.html"
            fi
          done
          
          echo "Use /text1 or /text2" > build/index.html
          echo "404 - Not found" > build/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
        env:
          TEXT1_URL: ${{ secrets.TEXT1_URL }}
          TEXT2_URL: ${{ secrets.TEXT2_URL }}
          TEXT3_URL: ${{ secrets.TEXT3_URL }}
