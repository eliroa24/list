name: Build pages from external texts

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # اجازه اجرای دستی

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch texts and create pages
        run: |
          mkdir -p build
          
          # خواندن نقشه از secret
          ROUTE_JSON='${{ secrets.ROUTE_MAP }}'
          
          # بررسی وجود secret
          if [ -z "$ROUTE_JSON" ] || [ "$ROUTE_JSON" = "" ]; then
            echo "ERROR: ROUTE_MAP secret is empty" > build/index.html
          else
            # پردازش هر کلید (slug)
            echo "$ROUTE_JSON" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read slug url; do
              echo "Processing $slug -> $url"
              mkdir -p "build/$slug"
              # دریافت محتوا از آدرس خارجی
              content=$(curl -sL "$url")
              if [ $? -eq 0 ] && [ -n "$content" ]; then
                # جایگزینی در قالب
                sed "s|__CONTENT__|$content|" template.html > "build/$slug/index.html"
              else
                echo "Failed to fetch $url" > "build/$slug/index.html"
              fi
            done
          fi
          
          # ساخت صفحه 404 پیش‌فرض (برای مسیرهای ناشناخته)
          cat > build/404.html << 'EOF'
          <!DOCTYPE html>
          <html dir="rtl" lang="fa">
          <head><meta charset="UTF-8"><title>404</title></head>
          <body style="font-family:Tahoma;text-align:center;margin-top:50px;">
            <h1>404</h1>
            <p>متنی برای این آدرس تعریف نشده است.</p>
          </body>
          </html>
          EOF
          
          # صفحه اصلی (اختیاری)
          echo '<html>از آدرس‌های /text1 یا /text2 استفاده کنید</html>' > build/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
